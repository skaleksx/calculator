<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый План (Professional V5)</title>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --danger-color: #e74c3c;
            --success-color: #27ae60;
            --reserve-color: #9b59b6;
            --text-color: #34495e;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 22px;
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            font-size: 18px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
        }

        .info-box {
            background: #e1f5fe;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 5px solid var(--accent-color);
        }

        .info-box label { margin-bottom: 5px; color: #0277bd; }
        .info-box input { background: #fff; border-color: #b3e5fc; font-size: 16px; }

        .reserves-box {
            background: #f4ecf7;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 5px solid var(--reserve-color);
        }
        
        .reserves-box label { color: #8e44ad; margin-bottom: 10px;}

        .reserve-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        .reserve-item input[type="text"] {
            flex: 1;
            font-size: 14px;
            padding: 8px;
            border-color: #d7bde2;
        }

        .reserve-item input[type="number"] {
            width: 100px;
            font-size: 16px;
            padding: 8px;
            border-color: #d7bde2;
        }

        .results {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f1f1f1;
        }

        .result-row:last-child { border-bottom: none; }
        .result-label { font-size: 15px; color: #7f8c8d; }
        .result-value { font-weight: 700; font-size: 16px; color: var(--primary-color); }

        .alimony-row { color: var(--danger-color); }
        .alimony-row .result-value { color: var(--danger-color); }
        
        .reserve-row { color: var(--reserve-color); }
        .reserve-row .result-value { color: var(--reserve-color); }

        .total-row {
            margin-top: 15px;
            padding-top: 20px;
            border-top: 3px solid #f1f1f1;
        }

        .total-label { font-weight: 800; font-size: 18px; color: var(--primary-color); }
        .total-value { font-size: 24px; color: var(--success-color); font-weight: 800; }

        .negative { color: var(--danger-color) !important; }

        .settings-btn {
            display: block;
            width: 100%;
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: background 0.2s;
        }

        #expenses-list {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        .exp-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .exp-item label { margin: 0; font-weight: 400; font-size: 14px; }
        .exp-item input { width: 90px; padding: 6px; font-size: 14px; border-width: 1px; }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 12px;
            color: #bdc3c7;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Финансовый план (Гонорар)</h1>
    
    <div class="input-group">
        <label for="income">Сумма гонорара / Доход (£):</label>
        <input type="number" id="income" value="2000" oninput="calculate()">
    </div>

    <div class="info-box">
        <label for="prev-income">Всего заработано ранее (с 6 апреля) £:</label>
        <input type="number" id="prev-income" value="0" oninput="calculate()">
    </div>

    <div class="reserves-box">
        <label>Резервные фонды (накопления):</label>
        <div class="reserve-item">
            <input type="text" value="Финансовая подушка" placeholder="Название фонда">
            <input type="number" class="res-val" value="0" oninput="calculate()">
        </div>
        <div class="reserve-item">
            <input type="text" value="На отпуск" placeholder="Название фонда">
            <input type="number" class="res-val" value="0" oninput="calculate()">
        </div>
        <div class="reserve-item">
            <input type="text" value="Для детей" placeholder="Название фонда">
            <input type="number" class="res-val" value="0" oninput="calculate()">
        </div>
    </div>

    <div class="results">
        <div class="result-row">
            <span class="result-label">Налоговый резерв UK:</span>
            <span class="result-value" id="tax-value">£0.00</span>
        </div>
        <div class="result-row">
            <span class="result-label">Чистая прибыль (Net):</span>
            <span class="result-value" id="net-value">£0.00</span>
        </div>
        <div class="result-row alimony-row">
            <span class="result-label">Алименты UA (25%):</span>
            <span class="result-value" id="alimony-value">£0.00</span>
        </div>
        <div class="result-row">
            <span class="result-label">Расходы в Британии:</span>
            <span class="result-value" id="total-expenses-display">£0.00</span>
        </div>
        <div class="result-row reserve-row">
            <span class="result-label">Отложено в фонды:</span>
            <span class="result-value" id="total-reserves-display">£0.00</span>
        </div>
        
        <div class="result-row total-row">
            <span class="total-label">СВОБОДНЫЙ ОСТАТОК:</span>
            <span class="total-value" id="final-balance">£0.00</span>
        </div>
    </div>

    <button class="settings-btn" onclick="toggleExpenses()">⚙️ Настроить фиксированные расходы</button>

    <div id="expenses-list">
        <div class="exp-item"><label>Аренда</label><input type="number" class="exp-val" value="510" oninput="calculate()"></div>
        <div class="exp-item"><label>Council Tax</label><input type="number" class="exp-val" value="180" oninput="calculate()"></div>
        <div class="exp-item"><label>Кредитка</label><input type="number" class="exp-val" value="100" oninput="calculate()"></div>
        <div class="exp-item"><label>Свет</label><input type="number" class="exp-val" value="80" oninput="calculate()"></div>
        <div class="exp-item"><label>Газ</label><input type="number" class="exp-val" value="120" oninput="calculate()"></div>
        <div class="exp-item"><label>Автостраховка</label><input type="number" class="exp-val" value="75" oninput="calculate()"></div>
        <div class="exp-item"><label>Еда</label><input type="number" class="exp-val" value="450" oninput="calculate()"></div>
        <div class="exp-item"><label>Интернет</label><input type="number" class="exp-val" value="40" oninput="calculate()"></div>
    </div>

    <div class="footer">
        <b>Строгий расчет по годовому лимиту:</b><br>
        Налог 0%, пока общая сумма за год не превысит £12,570.
    </div>
</div>

<script>
    function toggleExpenses() {
        const list = document.getElementById('expenses-list');
        list.style.display = list.style.display === 'block' ? 'none' : 'block';
    }

    function calculate() {
        const income = parseFloat(document.getElementById('income').value) || 0;
        const prevIncome = parseFloat(document.getElementById('prev-income').value) || 0;
        
        const ANNUAL_LIMIT = 12570;
        const TAX_RATE = 0.28;
        
        let tax = 0;
        
        // Строгая логика: никаких месячных лимитов. Только годовой.
        if (prevIncome >= ANNUAL_LIMIT) {
            tax = income * TAX_RATE;
        } else if ((prevIncome + income) > ANNUAL_LIMIT) {
            tax = ((prevIncome + income) - ANNUAL_LIMIT) * TAX_RATE;
        } else {
            tax = 0;
        }
        
        const net = income - tax;
        const alimony = net * 0.25;
        
        let totalExpenses = 0;
        document.querySelectorAll('.exp-val').forEach(input => {
            totalExpenses += parseFloat(input.value) || 0;
        });

        let totalReserves = 0;
        document.querySelectorAll('.res-val').forEach(input => {
            totalReserves += parseFloat(input.value) || 0;
        });
        
        // Вычитаем из остатка алименты, регулярные расходы и отложенные в резерв суммы
        const balance = net - alimony - totalExpenses - totalReserves;
        
        // Обновление интерфейса
        document.getElementById('tax-value').innerText = '£' + tax.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('net-value').innerText = '£' + net.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('alimony-value').innerText = '£' + alimony.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('total-expenses-display').innerText = '£' + totalExpenses.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('total-reserves-display').innerText = '£' + totalReserves.toLocaleString(undefined, {minimumFractionDigits: 2});
        
        const balEl = document.getElementById('final-balance');
        balEl.innerText = '£' + balance.toLocaleString(undefined, {minimumFractionDigits: 2});
        
        if (balance < 0) balEl.classList.add('negative');
        else balEl.classList.remove('negative');
    }

    calculate();
</script>

</body>
</html>
